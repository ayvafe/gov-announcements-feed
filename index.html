<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1f5fbf" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

    <!-- Static SEO / social defaults -->
    <title>Gov Announcements — Public government announcements feed</title>
    <meta
      name="description"
      content="Browse, search, filter and bookmark public government announcements across Health, Transport, Education and Infrastructure."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="http://localhost:5173/announcements" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="Gov Announcements" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Gov Announcements" />
    <meta
      property="og:description"
      content="Browse, search, filter and bookmark public government announcements."
    />
    <meta property="og:url" content="http://localhost:5173/announcements" />
    <meta property="og:image" content="http://localhost:5173/favicon.svg" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Gov Announcements" />
    <meta
      name="twitter:description"
      content="Browse, search, filter and bookmark public government announcements."
    />
    <meta name="twitter:image" content="http://localhost:5173/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
